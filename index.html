<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interior Design Portfolio 3D</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        :root {
            --gold: #c5a059;
            --dark: #1a1a1a;
            --white: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark);
            color: var(--white);
            overflow: hidden;
        }

        /* Schermata di Ingresso */
        #splash-screen {
            position: fixed; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&q=80') center/cover;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100; transition: 0.5s;
        }

        /* Menu Principale */
        #main-menu {
            display: none; height: 100vh;
            padding: 20px; box-sizing: border-box;
            background: #121212;
        }

        .category-btn {
            background: transparent; border: 1px solid var(--gold);
            color: var(--gold); padding: 15px; margin: 10px 0;
            width: 100%; font-size: 1.2rem; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
        }

        /* Lista Progetti */
        .project-list {
            display: none; margin-top: 20px;
        }

        .project-item {
            padding: 10px; border-bottom: 1px solid #333;
            cursor: pointer; display: flex; justify-content: space-between;
        }

        /* Container 3D */
        #viewer-container {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: white; z-index: 200;
        }

        model-viewer {
            width: 100%; height: 90%;
            --poster-color: transparent;
        }

        .back-btn {
            position: absolute; top: 20px; left: 20px;
            padding: 10px 20px; background: var(--dark);
            color: white; border: none; z-index: 201;
        }

        .ar-button {
            background-color: var(--gold); border-radius: 4px;
            border: none; position: absolute; bottom: 16px; right: 16px;
            padding: 10px 20px; color: white;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <h1 style="letter-spacing: 5px;">STUDIO DESIGN</h1>
        <button class="category-btn" style="width: 200px;" onclick="enterExperience()">ENTRA</button>
    </div>

    <div id="main-menu">
        <h2 style="color: var(--gold);">PORTFOLIO</h2>
        
        <button class="category-btn" onclick="showCategory('lavori-svolti')">Lavori Svolti</button>
        <div id="lavori-svolti" class="project-list">
            <div class="project-item" onclick="open3D('Living Room Moderno', 'https://modelviewer.dev/shared-assets/models/Astronaut.glb')">
                <span>Living Room Moderno</span> <span>→</span>
            </div>
            <div class="project-item" onclick="open3D('Cucina Minimal', 'https://modelviewer.dev/shared-assets/models/Astronaut.glb')">
                <span>Cucina Minimal</span> <span>→</span>
            </div>
        </div>

        <button class="category-btn" onclick="showCategory('lavori-attuali')">Lavori Attuali</button>
        <div id="lavori-attuali" class="project-list">
            <div class="project-item" onclick="open3D('Ufficio Open Space', 'https://modelviewer.dev/shared-assets/models/Astronaut.glb')">
                <span>Ufficio Open Space</span> <span>→</span>
            </div>
        </div>
    </div>

    <div id="viewer-container">
        <button class="back-btn" onclick="close3D()">← INDIETRO</button>
        <model-viewer 
            id="model"
            src="" 
            ar 
            ar-modes="webxr scene-viewer quick-look" 
            camera-controls 
            shadow-intensity="1" 
            auto-rotate>
            
            <button slot="ar-button" class="ar-button">
                VEDI IN CASA TUA (AR)
            </button>
        </model-viewer>
        <div id="model-title" style="color: #333; text-align: center; font-weight: bold;"></div>
    </div>

    <script>
        function enterExperience() {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('main-menu').style.display = 'block';
        }

        function showCategory(id) {
            const lists = document.querySelectorAll('.project-list');
            lists.forEach(list => list.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function open3D(title, modelUrl) {
            const container = document.getElementById('viewer-container');
            const model = document.getElementById('model');
            const titleDiv = document.getElementById('model-title');
            
            model.src = modelUrl;
            titleDiv.innerText = title;
            container.style.display = 'block';
        }

        function close3D() {
            document.getElementById('viewer-container').style.display = 'none';
        }
    </script>
</body>
</html>
