<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Pizzalunga – Menu AR</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Dancing+Script:wght@600;700&display=swap');

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:white;
color:#111;
}

/* SCHERMATA INIZIALE */

#start{
position:fixed;
inset:0;
background:white;
display:flex;
align-items:center;
justify-content:center;
z-index:10;
}

#start button{
font-family:'Dancing Script',cursive;
font-size:38px;
padding:22px 70px;
border-radius:40px;
border:none;
background:#e30613;
color:white;
}

/* HEADER */

header{
padding:20px 14px 10px;
text-align:center;
}

header img{
width:100%;
max-height:140px;
object-fit:contain;
}

/* MENU */

.menu{
padding:16px;
}

/* SEZIONI MENU */

.section{

border:2px solid #e30613;
border-radius:20px;
padding:16px;
margin-bottom:30px;
background:white;

}

.section-title{
font-family:'Dancing Script',cursive;
font-size:34px;
text-align:center;
color:#e30613;
margin-bottom:20px;
}

/* LISTA PIZZE */

.list{
display:flex;
flex-direction:column;
gap:14px;
}

/* PIZZA */

.item{
padding:18px;
background:#fafafa;
border-radius:14px;
text-align:center;
font-family:'Dancing Script',cursive;
font-size:28px;
cursor:pointer;
border:1px solid rgba(0,0,0,.1);
transition:.2s;
}

.item:hover{
transform:scale(1.03);
border-color:#e30613;
}

/* MODEL VIEWER NASCOSTO */

model-viewer{
position:absolute;
width:1px;
height:1px;
opacity:0;
pointer-events:none;
}

</style>
</head>

<body>

<div id="start">
<button onclick="enter()">Entra</button>
</div>

<audio id="dish" src="sounds/piatti.mp3" preload="auto"></audio>

<header>
<img src="images/logo.png">
</header>

<div class="menu">

<div class="section">

<div class="section-title">Pizze Classiche</div>

<div class="list">

<div class="item" onclick="openAR('pizza')">Margherita</div>

<div class="item" onclick="openAR('pizza')">Diavola</div>

<div class="item" onclick="openAR('pizzaballerina')">Capricciosa</div>

<div class="item" onclick="openAR('pizza')">Quattro Formaggi</div>

</div>

</div>


<div class="section">

<div class="section-title">Pizze Speciali</div>

<div class="list">

<div class="item" onclick="openAR('pizza')">Burrata</div>

<div class="item" onclick="openAR('pizza')">Diavola</div>

<div class="item" onclick="openAR('pizzaballerina')">Capricciosa</div>

</div>

</div>

</div>

<model-viewer
id="ar"
ar
ar-modes="scene-viewer quick-look webxr"
ar-scale="fixed"
camera-controls
interaction-prompt="none">
</model-viewer>

<script>

let unlocked=false;

function enter(){
unlocked=true;
document.getElementById("start").style.display="none";
}

function openAR(model){

if(!unlocked) return;

const dish=document.getElementById("dish");

dish.currentTime=0;
dish.play().catch(()=>{});

const viewer=document.getElementById("ar");

/* reset modello */

viewer.src="";
viewer.removeAttribute("ios-src");

/* carica modello */

viewer.src="models/"+model+".glb";
viewer.setAttribute("ios-src","models/"+model+".usdz");

/* avvia AR */

viewer.activateAR();

}

</script>

</body>
</html>
