<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pizzalonga AR Menu</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{

margin:0;
background:#ffffff;
font-family:'Inter',sans-serif;
color:#111;

}

/* START SCREEN */

#start{

position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:white;
z-index:20;

}

#enterBtn{

font-size:28px;
padding:22px 70px;
border-radius:50px;
border:none;
background:black;
color:white;
cursor:pointer;
transition:all .25s;

}

#enterBtn:hover{

transform:scale(1.05);

}

/* HEADER */

header{

text-align:center;
padding:30px 20px;

}

header img{

width:200px;
max-width:80%;

}

/* MENU */

.menu{

max-width:600px;
margin:auto;
padding:10px 20px 40px;

}

/* SEZIONE */

.section{

background:white;
border-radius:26px;
padding:24px;
margin-bottom:30px;

border:1px solid #eee;

box-shadow:

0 10px 30px rgba(0,0,0,0.04);

}

.section-title{

font-family:'Dancing Script',cursive;
font-size:34px;
text-align:center;
margin-bottom:20px;

}

/* LISTA */

.list{

display:flex;
flex-direction:column;
gap:14px;

}

/* ITEM PIZZA */

.item{

padding:18px;
border-radius:16px;

background:#fafafa;

font-size:20px;
text-align:center;

cursor:pointer;

transition:all .2s;

border:1px solid #eee;

}

.item:hover{

background:#f1f1f1;
transform:scale(1.02);

}

/* MODEL VIEWER NASCOSTO */

model-viewer{

position:absolute;
width:1px;
height:1px;
opacity:0;

}

</style>

</head>

<body>

<div id="start">

<button id="enterBtn" onclick="enterMenu()">Entra</button>

</div>

<audio id="sound" src="sounds/piatti.mp3" preload="auto"></audio>

<header>

<img src="images/logo.png">

</header>

<div class="menu">

<div class="section">

<div class="section-title">

Pizze Classiche

</div>

<div class="list">

<div class="item" onclick="openAR('pizza')">

Margherita

</div>

<div class="item" onclick="openAR('pizza')">

Diavola

</div>

<div class="item" onclick="openAR('pizzaballerina')">

Capricciosa

</div>

<div class="item" onclick="openAR('pizza')">

Quattro Formaggi

</div>

</div>

</div>

<div class="section">

<div class="section-title">

Pizze Speciali

</div>

<div class="list">

<div class="item" onclick="openAR('pizza')">

Burrata

</div>

<div class="item" onclick="openAR('pizza')">

Diavola Piccante

</div>

<div class="item" onclick="openAR('pizzaballerina')">

Capricciosa Deluxe

</div>

</div>

</div>

</div>

<model-viewer

id="arViewer"

ar

ar-modes="scene-viewer quick-look webxr"

ar-scale="fixed"

camera-controls

interaction-prompt="none"

>

</model-viewer>

<script>

let unlocked=false

function enterMenu(){

unlocked=true

document.getElementById("start").style.display="none"

}

function openAR(model){

if(!unlocked) return

const sound=document.getElementById("sound")

sound.currentTime=0
sound.play().catch(()=>{})

const viewer=document.getElementById("arViewer")

viewer.src="models/"+model+".glb"

viewer.setAttribute("ios-src","models/"+model+".usdz")

viewer.activateAR()

}

</script>

</body>
</html>
